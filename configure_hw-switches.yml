---
- name: Konfiguriere Lid Switch und Power-Button
  vars:
    target_group: "{{ target_group | default('INFacerWLAN') }}"
    backup_dir: "backup/{{ inventory_hostname }}"
    timestamp: "{{ ansible_date_time.iso8601 }}"
    udev_rule_path: "/etc/udev/rules.d/99-lid-power.rules"
  hosts: "{{ target_group }}"
  remote_user: root
  tasks:
  - name: Konfiguriere systemd (logind.conf)
    lineinfile:
      path: /etc/systemd/logind.conf
      line: "{{ item }}"
      state: present
    loop:
      - HandleLidSwitch=poweroff
      - HandlePowerKey=poweroff
    ignore_errors: no

  - name: Ensure systemd-logind.service is masked (symlink to /dev/null)
    become: yes
    file:
      path: /etc/systemd/system/systemd-logind.service
      state: link
      src: /dev/null

  - name: Reload systemd daemon
    become: yes
    command: systemctl daemon-reload
    changed_when: false


  - name: Konfiguriere udev-Regeln
    copy:
      content: "ACTION==\"change\", SUBSYSTEM==\"power\", RUN+=\"/bin/sh -c 'echo poweroff > /sys/power/state'\""
      dest: "{{ udev_rule_path }}"
      mode: '0644'
    ignore_errors: no

  - name: Liste Power-bezogene Dienste auf Zielhost
    become: yes
    command: systemctl list-units --type=service --no-legend
    register: svc_list
    changed_when: false

  - name: Neustart
    reboot:
      msg: "Neustart erforderlich"
      connect_timeout: 5
      reboot_timeout: 300
      pre_reboot_delay: 0
      post_reboot_delay: 60

